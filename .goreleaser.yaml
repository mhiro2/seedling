version: 2

project_name: seedling-gen

builds:
  - main: ./cmd/seedling-gen
    binary: seedling-gen
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

changelog:
  sort: asc

homebrew_casks:
  - name: seedling-gen
    binaries:
      - seedling-gen
    description: Dependency-aware test data builder CLI for Go and SQL databases
    homepage: https://github.com/mhiro2/seedling
    url:
      verified: github.com/mhiro2/seedling/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/seedling-gen"]
          end
    repository:
      owner: mhiro2
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

release:
  github:
    owner: mhiro2
    name: seedling
