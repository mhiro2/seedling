name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.0
          install: false
          cache: false
      - name: Resolve golangci-lint version
        id: golangci
        run: echo "version=v$(mise current golangci-lint)" >> "$GITHUB_OUTPUT"
      - name: Run golangci-lint
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          golangci_lint_version: ${{ steps.golangci.outputs.version }}
          github_token: ${{ secrets.github_token }}
          level: warning
          filter_mode: nofilter
          reporter: github-pr-review

  lint-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: integration/go.mod
          cache: true
          cache-dependency-path: integration/go.sum
      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.0
          install: false
          cache: false
      - name: Resolve golangci-lint version
        id: golangci
        run: echo "version=v$(mise current golangci-lint)" >> "$GITHUB_OUTPUT"
      - name: Run golangci-lint
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          golangci_lint_version: ${{ steps.golangci.outputs.version }}
          golangci_lint_flags: "--config=${{ github.workspace }}/.golangci.yaml --build-tags=integration"
          workdir: integration/
          github_token: ${{ secrets.github_token }}
          level: warning
          filter_mode: nofilter
          reporter: github-pr-review

  test:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Install dependencies
        run: go install tool
      - name: Check licenses
        run: make check-licenses
      - name: Test
        run: make test
      - name: Coverage analysis
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: .octocov.yaml

  test-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db:
          - mysql
          - postgres
          - sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: integration/go.mod
          cache: true
          cache-dependency-path: integration/go.sum
      - name: Install dependencies
        run: go install tool
        working-directory: integration/
      - name: Run ${{ matrix.db }} integration tests
        run: make test-integration-${{ matrix.db }}
