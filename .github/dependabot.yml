version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/integration"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      gomod-monorepo:
        group-by: dependency-name
